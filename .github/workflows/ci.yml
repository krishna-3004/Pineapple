name: Docker Local CI
on:
  push:
    branches: [ "master" ]
jobs:
  build:
    runs-on: self-hosted  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build Docker Image
      run: docker build -t hello-world-local .
    - name: Run Docker Container
      run: docker run --rm hello-world-local